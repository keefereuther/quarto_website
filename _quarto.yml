lang: en
bibliography: references.bib

# Static site only — no Jupyter kernels or code execution on build.
execute:
  enabled: false

project:
  type: website
  render:
    - index.qmd
    - license.qmd
    - docs/

website:
  title: "The Reuther Lab"
  image: "assets/logokeefe/logokeefe-social-256.webp"
  reader-mode: true
  open-graph: true
  twitter-card: true
  favicon: "assets/logokeefe/logokeefe-favicon-48.png"
  site-url: https://keefereuther.com
  repo-url: https://github.com/keefereuther/quarto_website
  page-navigation: false
  bread-crumbs: false
  navbar:
    logo: assets/logokeefe/logokeefe-navbar-144.webp
    logo-alt: "Keefe Reuther logo: lightbulb with question mark"
    background: "#0E8FA3"
    foreground: "#FAF7F2"
    right:
      - text: "About"
        menu:
          - href: docs/about/keefe/index.qmd
            text: Keefe Reuther
          - href: docs/about/contact/index.qmd
            text: Contact Us
          - href: docs/about/people/index.qmd
            text: People
      - href: docs/teaching/index.qmd
        text: Teaching
      - text: "Scholarship"
        menu:
          - href: docs/scholarship/publications.qmd
            text: Publications
          - href: docs/scholarship/presentations.qmd
            text: Presentations
          - href: docs/genai/tools/index.qmd
            text: AI Tools
          - href: docs/genai/community/index.qmd
            text: AI Community
      - href: docs/blog/index.qmd
        text: Blog

  page-footer:
    border: true
    left: |
      [![](/assets/ucsdbioweb.png){fig-alt="UCSD Bio" width=100px}](https://biosci.ucsd.edu) 
      [![](/assets/ebewebbug.png){fig-alt="UCSD EBE" width=100px}](https://biology.ucsd.edu/research/academic-departments/ebe/)
      [![](/assets/UCSanDiegoLogo-BlueGold.png){fig-alt="UCSD" width=100px}](https://ucsd.edu)
    right:
      - text: "Some portions of this site use generative AI to assist with creation and maintenance. All content is authored, reviewed, and verified by the Reuther Lab. We take full responsibility for everything published here."
      - icon: github
        href: https://github.com/keefereuther
        aria-label: Keefe Reuther GitHub
      - text: "License"
        href: license.qmd

format:
  html:
    page-layout: article
    math: false
    include-in-header: _includes/skip-nav.html
    theme:
      light: [minty, theme-light.scss]
      dark: [quartz, theme-dark.scss]
    css: styles.css
    toc: false
    fontsize: 1.2em
    grid:
      sidebar-width: 200px
      body-width: 1000px
      margin-width: 200px

editor: visual

